name: Update Platform Status

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'  # Also runs every hour to keep timestamp current
  workflow_dispatch:

jobs:
  update-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate STATUS.md
        run: |
          # Core metrics
          TOTAL_COMMITS=$(git log --oneline | wc -l | tr -d ' ')
          CONTRIBUTORS=$(git shortlog -sn HEAD | wc -l | tr -d ' ')
          FIRST_COMMIT_DATE=$(git log --format="%ad" --date=short | tail -1)
          LAST_COMMIT=$(git log -1 --format="%H")
          LAST_COMMIT_SHORT=$(git log -1 --format="%h")
          LAST_COMMIT_MSG=$(git log -1 --format="%s")
          LAST_COMMIT_DATE=$(git log -1 --format="%ad" --date=format:'%B %d, %Y')
          LAST_COMMIT_AUTHOR=$(git log -1 --format="%an")

          # Activity metrics
          COMMITS_LAST_30=$(git log --oneline --since="30 days ago" | wc -l | tr -d ' ')
          COMMITS_LAST_7=$(git log --oneline --since="7 days ago" | wc -l | tr -d ' ')
          FILES_CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | wc -l | tr -d ' ')

          # Codebase metrics
          PYTHON_FILES=$(find . -name "*.py" -not -path "*/\.*" -not -path "*/migrations/*" | wc -l | tr -d ' ')
          API_ENDPOINTS=$(grep -r "router.register\|path(" api/ --include="*.py" 2>/dev/null | wc -l | tr -d ' ')
          TEST_FILES=$(find . -name "test_*.py" -o -name "*_test.py" | wc -l | tr -d ' ')
          MIGRATIONS=$(find . -path "*/migrations/0*.py" | wc -l | tr -d ' ')

          # Top contributors
          CONTRIBUTORS_LIST=$(git shortlog -sn HEAD | head -5 | awk '{$1=$1; print "| " $1 " commits | " substr($0, index($0,$2)) " |"}')

          # Days active
          DAYS_ACTIVE=$(( ( $(date +%s) - $(date -d "$FIRST_COMMIT_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$FIRST_COMMIT_DATE" +%s) ) / 86400 ))

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")

          cat > STATUS.md << STATUSEOF
          # Glapagos Platform — Live Status

          > This document is generated automatically by the CI pipeline on every commit to main.
          > It reflects the real state of the platform, not a press release.

          **Last updated:** $TIMESTAMP
          **Status:** 🟢 Active Development

          ---

          ## Platform Activity

          | Metric | Value |
          |--------|-------|
          | Total commits | $TOTAL_COMMITS |
          | Contributors | $CONTRIBUTORS |
          | Days in active development | $DAYS_ACTIVE |
          | Commits in last 7 days | $COMMITS_LAST_7 |
          | Commits in last 30 days | $COMMITS_LAST_30 |
          | First commit | $FIRST_COMMIT_DATE |

          ---

          ## Latest Deployment

          | Field | Value |
          |-------|-------|
          | Commit | \`$LAST_COMMIT_SHORT\` |
          | Message | $LAST_COMMIT_MSG |
          | Date | $LAST_COMMIT_DATE |
          | Author | $LAST_COMMIT_AUTHOR |

          ---

          ## Codebase Health

          | Metric | Value |
          |--------|-------|
          | Python source files | $PYTHON_FILES |
          | Registered API endpoints | $API_ENDPOINTS |
          | Test files | $TEST_FILES |
          | Database migrations | $MIGRATIONS |

          ---

          ## Health Checks

          The platform exposes a live health endpoint at \`/api/v1/health/\` that verifies:

          | Service | Check type |
          |---------|-----------|
          | Database (PostgreSQL) | Active query |
          | Redis | Active ping |
          | Celery workers | Active worker inspection |

          ---

          ## Top Contributors

          | Commits | Contributor |
          |---------|------------|
          $CONTRIBUTORS_LIST

          ---

          ## Regions

          Glapagos is deployed across **12+ regions** in the Western Hemisphere, coordinated
          through the AI Corridor of the Americas by RaceFor.AI and GENIA Americas.

          ---

          ## What this proves

          This is $TOTAL_COMMITS commits across $DAYS_ACTIVE days of active development
          by $CONTRIBUTORS contributors — proof that the AI infrastructure layer the Americas
          needs is not a future project. It is here, and it is working.

          → [Platform access and Corridor Report](https://www.glapagos.com/resources)
          → [Why this matters now](docs/WHY_NOW.md)
          → [Regional impact](docs/REGIONAL_IMPACT.md)

          ---

          *Generated by GitHub Actions on every push to main.
          Commit: [$LAST_COMMIT_SHORT](https://github.com/GENIA-Americas/Glapagos-Backend/commit/$LAST_COMMIT)*
          STATUSEOF

          # Clean up leading whitespace from heredoc
          sed -i 's/^          //' STATUS.md

      - name: Commit STATUS.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add STATUS.md
          git diff --staged --quiet || git commit -m "chore: auto-update STATUS.md [skip ci]"
          git push
